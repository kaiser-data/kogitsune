# kogitsune 🦊 — example kits config
# Copy to ../kits.yaml and edit. The fox merges MCP server definitions from
# ~/.claude/mcp-on-demand.json by name, so you only reference them here.

# Always rides along — never a toggle.
pinned:
  memory:     { plugin: "claude-mem@thedotmack" }
  guardrails: { import: "~/.claude/rules/guardrails.md" }
  graphify:   { skill: "graphify" }

# Catalog of selectable items, with rough context-weight hints (tokens) for the pack-weight bar.
catalog:
  mcp:
    supabase:         { weight: 10000, tag: "🔴" }
    n8n-mcp:          { weight: 12000, tag: "🔴" }
    notion:           { weight: 4000,  tag: "🟠" }
    dify-superclaude: { weight: 3000,  tag: "🟠" }
    kitsune:          { weight: 2000,  tag: "🟡" }   # the lean big sibling
    kitsune-forge:    { weight: 2000,  tag: "🟡" }
    context7:         { weight: 1000,  tag: "🟢" }
    # a plugin-bundled MCP re-exposed as an explicit opt-in (see gate_mcp below):
    chrome-devtools:  { weight: 1000,  tag: "🟢", def: { command: "npx", args: ["-y", "chrome-devtools-mcp@latest"] } }
  skills:
    # gate_mcp: enable the plugin but drop its bundled .mcp.json from the mirror —
    # plugin MCP servers bypass --strict-mcp-config and would spawn in every session.
    ecc:              { plugin: "ecc@ecc", weight: 4200, tag: "🟡", gate_mcp: true }  # full harness (measured; content defers until invoked)
    # rules packs (dirs of *.md under ~/.claude/rules) are gated: the mirror excludes
    # the auto-loaded rules/ dir; picking one imports its files into the session CLAUDE.md.
    ecc-rules-common: { rules: "ecc/common",     weight: 4100, tag: "🟡" }
    ecc-rules-ts:     { rules: "ecc/typescript", weight: 1700, tag: "🟢" }
    ecc-rules-py:     { rules: "ecc/python",     weight: 1200, tag: "🟢" }
    postgres-bp:      { plugin: "postgres-best-practices@supabase-agent-skills", weight: 2000, tag: "🟡" }
    n8n:              { dir: "~/.claude/skills/n8n-*", count: 7, weight: 4000, tag: "🟡" }
    frontend-design:  { plugin: "frontend-design@claude-plugins-official", weight: 1000, tag: "🟢" }

# Named kits shown in the picker and launchable directly via `kit <name>`.
# Kits compose: `extends:` inherits another kit; "+name"/"-name" add or remove items.
# Optional `model:` per kit sets the launch model (opus|sonnet|haiku|full id); it's
# inherited via `extends`, overridable live in the picker (ctrl-o), and always beaten
# by an explicit `kit <name> -- --model <x>`. Omit it to use Claude Code's default.
kits:
  lean:     { mcp: [],                 skills: [] }
  db:       { model: opus, mcp: [supabase], skills: [postgres-bp] }
  db-heavy: { extends: db, mcp: ["+context7"] }      # inherit db (incl. model: opus), add a server
  n8n:      { mcp: [n8n-mcp],          skills: [n8n] }
  frontend: { model: sonnet, mcp: [], skills: [frontend-design] }
  research: { mcp: [notion, context7], skills: [] }
  ecc:      { mcp: [],                 skills: [ecc, ecc-rules-common] }  # full ECC harness + its core rules
  deep:     { extends: ecc, mcp: ["+context7"] }                 # ECC + docs lookup for heavy builds
  qa:       { extends: ecc, mcp: ["+chrome-devtools"] }          # ECC + interactive DevTools (traces, heap, console)
